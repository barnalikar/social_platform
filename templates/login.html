<!DOCTYPE html><html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body>

    <div class="auth-box">

        <h1>Welcome Back 👋</h1>

        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="Enter username"
            >

            <input
                type="password"
                name="password"
                placeholder="Enter password"
            >

            <button type="submit">
                Login
            </button>

        </form>

        <div class="center-link">

            <a href="/register">
                Create Account
            </a>

        </div>

    </div>

</body>

</html
